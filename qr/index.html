<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PRODUCTOS JORAN</title>
  <meta name="robots" content="noindex,nofollow" />
  <style>
    :root{color-scheme:light}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Helvetica,Arial,sans-serif;background:#0b0f1a;color:#fff}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{max-width:560px;width:100%;background:#111a2b;border:1px solid #24304a;border-radius:18px;padding:22px;box-shadow:0 18px 50px rgba(0,0,0,.35)}
    h1{margin:0 0 10px;font-size:22px;letter-spacing:.2px}
    p{margin:0 0 18px;color:#cbd5e1;line-height:1.5}
    .btn{display:block;text-decoration:none;text-align:center;padding:14px 16px;border-radius:14px;margin:12px 0;font-weight:800;letter-spacing:.2px}
    .wa{background:#22c55e;color:#052e14}
    .wa:hover{filter:brightness(1.03)}
    .web{background:#2563eb;color:#eff6ff}
    .web:hover{filter:brightness(1.03)}
    .hint{font-size:12px;color:#94a3b8;margin-top:14px}
  </style>
</head>
<body>
  <div class="wrap">
    <main class="card" role="main">
      <h1>PRODUCTOS JORAN</h1>
      <p>Elige una opción:</p>

      <a class="btn wa" href="https://wa.me/56962378434?text=Hola%20PRODUCTOS%20JORAN%20quisiera%20consultar%20sobre" target="_blank" rel="noopener">
        Hablar por WhatsApp
      </a>

      <a class="btn web" href="https://joran.cl" target="_blank" rel="noopener">
        Ir a joran.cl
      </a>

      <div class="hint">Si no se abre WhatsApp, verifica que esté instalado en tu teléfono.</div>
    </main>
  </div>
</body>
</html>
